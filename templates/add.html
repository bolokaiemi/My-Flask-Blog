<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='add.css') }}">
</head>
<body>

<div class="form-container">

    <h2 class="form-title">Add New Blog Post</h2>

    <!-- Show validation error -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="{{ url_for('add') }}" method="POST" class="form">

        <label for="title">Title:</label>
        <input type="text" id="title" name="title" class="form-input" placeholder="Enter post title">

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" class="form-input" placeholder="Your name">

        <label for="content">Content:</label>
        <textarea id="content" name="content" class="form-textarea" placeholder="Write your post..."></textarea>

        <button type="submit" class="form-button">Post Blog</button>

    </form>

</div>

</body>
</html>
